    <script>
        const canvas = document.getElementById('stars-canvas');
        const ctx = canvas.getContext('2d');
        
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);
        
        class Star {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 6 + 2;
                this.speedY = Math.random() * 2 + 1;
                this.speedX = Math.random() - 0.5;
                this.colors = [
                    '#ff6b81', '#ff8fa3', '#ffc2d1', '#ff4757', 
                    '#70e1f5', '#ffd166', '#06d6a0', '#118ab2'
                ];
                this.color = this.colors[Math.floor(Math.random() * this.colors.length)];
                this.alpha = Math.random() * 0.4 + 0.6;
            }
            
            update() {
                this.y += this.speedY;
                this.x += this.speedX;
                if (this.y > canvas.height) {
                    this.y = 0 - this.size;
                    this.x = Math.random() * canvas.width;
                }
            }
            
            draw() {
                ctx.save();
                ctx.globalAlpha = this.alpha;
                ctx.fillStyle = this.color;
                ctx.translate(this.x, this.y);
                ctx.rotate(Math.random() * Math.PI * 2);
                ctx.beginPath();
                for (let i = 0; i < 5; i++) {
                    ctx.lineTo(
                        Math.cos((i * 144 * Math.PI / 180)) * this.size,
                        Math.sin((i * 144 * Math.PI / 180)) * this.size
                    );
                    ctx.lineTo(
                        Math.cos(((i * 144 + 72) * Math.PI / 180)) * this.size / 2.5,
                        Math.sin(((i * 144 + 72) * Math.PI / 180)) * this.size / 2.5
                    );
                }
                ctx.closePath();
                ctx.fill();
                ctx.restore();
            }
        }
        
        const stars = [];
        const starCount = 80;
        for (let i = 0; i < starCount; i++) {
            stars.push(new Star());
        }
        
        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            stars.forEach(star => {
                star.update();
                star.draw();
            });
            requestAnimationFrame(animate);
        }
        animate();
    </script>
