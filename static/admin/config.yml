backend:
  name: github
  repo: cellrin050-beep/CreateWebcellrin.github.io
  branch: main
  base_url: https://api.github.com

collections:
  - name: "posts"
    label: "Posts"
    folder: "content/posts"
    create: true
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Body", name: "body", widget: "markdown" }